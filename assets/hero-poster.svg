<!-- Hero poster fallback - using first project image -->
<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="50%" style="stop-color:#0f2440"/>
      <stop offset="100%" style="stop-color:#1a3a5c"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <!-- Geometric industrial shapes -->
  <g opacity="0.1" stroke="#0077cc" stroke-width="1" fill="none">
    <rect x="100" y="200" width="400" height="300" rx="2"/>
    <line x1="100" y1="350" x2="500" y2="350"/>
    <line x1="300" y1="200" x2="300" y2="500"/>
    <circle cx="960" cy="540" r="200"/>
    <circle cx="960" cy="540" r="300"/>
    <polygon points="1400,200 1700,400 1400,600"/>
    <line x1="0" y1="800" x2="1920" y2="800"/>
    <line x1="600" y1="0" x2="600" y2="1080"/>
    <line x1="1300" y1="0" x2="1300" y2="1080"/>
  </g>
  <g opacity="0.05" fill="#ffffff">
    <rect x="800" y="400" width="320" height="4"/>
    <rect x="800" y="420" width="200" height="4"/>
  </g>
</svg>